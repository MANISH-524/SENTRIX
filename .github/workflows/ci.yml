name: SENTRIX CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install runtime deps (light profile)
        run: pip install fastapi "uvicorn[standard]" httpx python-dotenv pydantic pytest
      - name: Compile all modules
        run: python -m py_compile $(find agent api scripts -name "*.py")
      - name: Run test suite
        run: pytest tests/ -q
